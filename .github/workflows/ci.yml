name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Format
            command: fmt:check
          - label: Lint
            command: lint
          - label: Typecheck
            command: typecheck
          - label: Unit tests
            command: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.label }}
        run: bun run ${{ matrix.command }}

  browser_test:
    name: Browser tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun, Turbo, and Playwright
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/ms-playwright
            .turbo
          key: ${{ runner.os }}-browser-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-browser-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run the workspace-local binary directly: bunx stalled after Chromium
      # downloads on hosted runners.
      - name: Install browser runtime
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cd apps/web
          ./node_modules/.bin/playwright install --with-deps chromium

      # Keep Linux geometry parity failures visible without blocking unrelated
      # changes until the headless rendering assertions are repaired.
      - name: Run browser tests
        continue-on-error: true
        run: bun run --cwd apps/web test:browser

  desktop_build:
    name: Desktop build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun, Turbo, and Electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/electron
            .turbo
          key: ${{ runner.os }}-desktop-build-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-desktop-build-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Linux terminal PTY native dependency
        run: node scripts/node-pty-smoke.mjs

      - name: Build desktop pipeline
        run: bun run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.js
          grep -nE "desktopBridge|getWsUrl|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.js

  release_smoke:
    name: Release smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Verify vendored Effect tarballs
        run: sha256sum --check vendor/effect/SHA256SUMS

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts

  quality:
    name: Quality
    if: always()
    needs: [checks, browser_test, desktop_build, release_smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every CI lane
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
          BROWSER_RESULT: ${{ needs.browser_test.result }}
          DESKTOP_BUILD_RESULT: ${{ needs.desktop_build.result }}
          RELEASE_SMOKE_RESULT: ${{ needs.release_smoke.result }}
        run: |
          for result in \
            "$CHECKS_RESULT" \
            "$BROWSER_RESULT" \
            "$DESKTOP_BUILD_RESULT" \
            "$RELEASE_SMOKE_RESULT"; do
            test "$result" = "success"
          done
