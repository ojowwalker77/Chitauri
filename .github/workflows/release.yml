name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to retry (for example v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      release_mac: ${{ steps.build_matrix.outputs.release_mac }}
      release_files: ${{ steps.build_matrix.outputs.release_files }}
      ref: ${{ steps.release_meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.tag }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$raw" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Invalid canonical release tag: $raw" >&2
            exit 1
          fi
          version="${raw#v}"
          ref="$(git rev-list -n 1 "$raw" 2>/dev/null || true)"
          if [[ -z "$ref" ]]; then
            echo "Release tag does not exist: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$raw" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout resolved tag commit
        run: git checkout --detach "${{ steps.release_meta.outputs.ref }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Validate committed release source
        run: ./script/release-preflight "${{ steps.release_meta.outputs.tag }}"

      - id: build_matrix
        name: Resolve build matrix
        shell: bash
        run: |
          # macOS artifacts are only publishable when they can be signed AND
          # notarized; an unsigned mac build is rejected downstream rather than
          # shipped. Configure the five Apple secrets, then set RELEASE_MAC=1.
          linux_win='{"label":"Linux x64","runner":"ubuntu-24.04","platform":"linux","target":"AppImage","arch":"x64"},{"label":"Windows x64","runner":"windows-2022","platform":"win","target":"nsis","arch":"x64"}'
          mac='{"label":"macOS arm64","runner":"macos-14","platform":"mac","target":"dmg","arch":"arm64"},{"label":"macOS x64","runner":"macos-15-intel","platform":"mac","target":"dmg","arch":"x64"}'

          if [[ "${{ vars.RELEASE_MAC }}" != "1" ]]; then
            echo "::error title=macOS release is required::Set RELEASE_MAC=1 after configuring signing and notarization secrets."
            exit 1
          fi
          echo "release_mac=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[$mac,$linux_win]}" >> "$GITHUB_OUTPUT"

          # Kept in sync with the required matrix above.
          {
            echo "release_files<<RELEASE_FILES_EOF"
            echo "release-assets/*.dmg"
            echo "release-assets/*.zip"
            echo "release-assets/*.AppImage"
            echo "release-assets/*.exe"
            echo "release-assets/*.blockmap"
            echo "release-assets/latest*.yml"
            echo "release-assets/SHA256SUMS.txt"
            echo "RELEASE_FILES_EOF"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: Release quality gates
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Verify vendored Effect tarballs
        run: sha256sum --check vendor/effect/SHA256SUMS

      - name: Install dependencies
        run: ./script/bootstrap

      - name: Run shared quality contract
        run: ./script/check

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.preflight.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      # The staged `bun install --production` re-downloads the Electron binary
      # and electron-builder re-fetches its helper tooling (NSIS, winCodeSign,
      # DMG helpers) on every run without this. Paths cover all three runner
      # OSes; actions/cache skips the ones that don't exist.
      - name: Cache Electron and electron-builder downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        # The quality job runs the full lifecycle-script install plus lint,
        # typecheck, and tests. Artifact jobs only need dependencies available.
        run: ./script/bootstrap --ignore-scripts

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_P8 || secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID || secrets.APPLE_API_ISSUER }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if ! has_all "$CSC_LINK" "$CSC_KEY_PASSWORD"; then
              echo "::error title=macOS release signing is required::Configure MACOS_CERTIFICATE_P12_BASE64 and MACOS_CERTIFICATE_PASSWORD."
              exit 1
            fi

            if ! has_all "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              echo "::error title=macOS notarization is required::Configure APPLE_API_KEY_P8, APPLE_API_KEY_ID, and APPLE_API_ISSUER_ID."
              exit 1
            fi

            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY" > "$key_path"
            export APPLE_API_KEY="$key_path"
            echo "macOS signing and API-key notarization enabled."
            args+=(--signed)
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            if has_all \
              "$AZURE_TENANT_ID" \
              "$AZURE_CLIENT_ID" \
              "$AZURE_CLIENT_SECRET" \
              "$AZURE_TRUSTED_SIGNING_ENDPOINT" \
              "$AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" \
              "$AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" \
              "$AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"; then
              echo "Windows signing enabled (Azure Trusted Signing)."
              args+=(--signed)
            else
              echo "Windows signing disabled (missing one or more Azure Trusted Signing secrets)."
            fi
          else
            echo "Signing disabled for ${{ matrix.platform }}."
          fi

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" == "x64" ]]; then
            # electron-builder occasionally times out fetching x64 DMG helper bundles on GitHub-hosted macOS runners.
            # Retry this narrow packaging path so transient upstream 504s do not block the whole release.
            max_attempts=3
            for attempt in $(seq 1 "$max_attempts"); do
              if bun run dist:desktop:artifact -- "${args[@]}"; then
                break
              fi

              if [[ "$attempt" -eq "$max_attempts" ]]; then
                echo "macOS x64 desktop artifact build failed after $max_attempts attempts."
                exit 1
              fi

              sleep_seconds=$((attempt * 15))
              echo "macOS x64 desktop artifact build failed on attempt $attempt/$max_attempts. Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done
          else
            bun run dist:desktop:artifact -- "${args[@]}"
          fi

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish_cli:
    name: Publish CLI to npm
    if: ${{ vars.TEACODE_PUBLISH_CLI == '1' }}
    needs: [preflight, quality, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        # The quality job validates lifecycle scripts; the publish job only
        # needs dependencies available to build the package.
        run: ./script/bootstrap --ignore-scripts

      - name: Build CLI package
        run: bun run build --filter=@t3tools/web --filter=t3

      - name: Publish CLI package
        run: node apps/server/scripts/cli.ts publish --tag latest --app-version "${{ needs.preflight.outputs.version }}" --verbose

  release:
    name: Publish GitHub Release
    needs: [preflight, quality, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        if: ${{ needs.preflight.outputs.release_mac == 'true' }}
        run: |
          node scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Generate release checksums
        run: |
          cd release-assets
          shasum -a 256 * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: TeaCode v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: ${{ needs.preflight.outputs.release_files }}
          fail_on_unmatched_files: true
