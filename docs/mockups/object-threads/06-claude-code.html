<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chitauri — Object Threads · Claude Code</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #0a0a0a;
        --panel: #171717;
        --panel-border: rgba(255, 255, 255, 0.07);
        --hover: rgba(255, 255, 255, 0.05);
        --selected: rgba(255, 255, 255, 0.08);
        --foreground: #e6e4e1;
        --muted: #9c9a96;
        --faint: #6b6965;
        --coral: #d97757;
        --gold: #cf9d5e;
        --green: #4cb782;
        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        --dur-press: 120ms;
        --dur-hover: 140ms;
        --dur-enter: 220ms;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: var(--background);
        color: var(--foreground);
        font:
          14px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* wallpaper sliver at the very top of the window, like the desktop app */
      body::before {
        content: "";
        position: fixed;
        inset: 0 0 auto 0;
        height: 8px;
        z-index: 0;
        background: linear-gradient(90deg, #22331f, #3a5232 30%, #2c4128 60%, #1d2b1b);
      }
      button,
      textarea {
        font: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
      }
      svg {
        display: block;
      }
      :focus-visible {
        outline: 2px solid rgba(217, 119, 87, 0.55);
        outline-offset: 2px;
        border-radius: 10px;
      }
      ::selection {
        background: rgba(217, 119, 87, 0.3);
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.09);
        border-radius: 8px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      .icon {
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .icon.small {
        width: 14px;
        height: 14px;
      }
      .mono {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      }
      .nowrap {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .app {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 288px minmax(0, 1fr);
        gap: 12px;
        padding: 20px 12px 12px;
      }

      /* ————— Sidebar: floating rounded panel ————— */
      .sidebar {
        min-height: 0;
        display: grid;
        grid-template-rows: 56px auto minmax(0, 1fr) 60px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        color: #c9c7c3;
      }
      .window-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
      }
      .traffic {
        display: flex;
        gap: 8px;
      }
      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .traffic span:nth-child(1) {
        background: #ff5f57;
      }
      .traffic span:nth-child(2) {
        background: #febc2e;
      }
      .traffic span:nth-child(3) {
        background: #28c840;
      }
      .history {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .icon-button {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 9px;
        display: grid;
        place-items: center;
        color: #8a8884;
        background: transparent;
        transition:
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease,
          transform var(--dur-press) var(--ease-out);
      }
      .icon-button:active,
      .nav-row:active,
      .side-row:active,
      .composer-chip:active,
      .top-action:active,
      .send:active,
      .object-add:active,
      .decision-choice:active {
        transform: scale(0.97);
      }

      .sidebar-primary {
        padding: 6px 10px 12px;
        display: grid;
        gap: 1px;
      }
      .nav-row {
        width: 100%;
        height: 40px;
        border: 0;
        border-radius: 10px;
        display: grid;
        grid-template-columns: 26px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        text-align: left;
        color: #c2c0bc;
        background: transparent;
        font-size: 14px;
        transition:
          background-color var(--dur-hover) ease,
          transform var(--dur-press) var(--ease-out);
      }
      .nav-row .icon {
        color: #a3a19d;
      }
      .shortcut {
        color: #5d5b58;
        font-size: 11.5px;
        font-variant-numeric: tabular-nums;
      }
      .sidebar-scroll {
        min-height: 0;
        overflow: auto;
        padding: 2px 10px 20px;
      }
      .section-head {
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px;
        color: #7a7874;
        font-size: 12.5px;
      }
      .section-head button {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #6b6965;
        background: transparent;
        transition:
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease;
      }
      .side-row {
        width: 100%;
        min-height: 38px;
        border: 0;
        border-radius: 10px;
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        text-align: left;
        color: #bfbdb9;
        background: transparent;
        font-size: 13.5px;
        transition:
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease,
          transform var(--dur-press) var(--ease-out);
      }
      .side-row.active {
        background: var(--selected);
        color: #f0eeec;
      }
      .side-row.project-active {
        background: rgba(255, 255, 255, 0.035);
      }
      .side-row .leading {
        display: grid;
        place-items: center;
        color: #a3a19d;
      }
      .side-row .label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .side-row .meta {
        color: #605e5b;
        font-size: 11.5px;
      }
      .nested {
        position: relative;
        margin-left: 16px;
        padding-left: 10px;
      }
      .nested::before {
        content: "";
        position: absolute;
        left: 0;
        top: 2px;
        bottom: 4px;
        width: 1px;
        background: rgba(255, 255, 255, 0.06);
      }
      .nested .side-row {
        min-height: 36px;
        grid-template-columns: 24px minmax(0, 1fr) auto;
        padding-left: 7px;
        font-size: 13px;
      }
      .provider-mark {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--coral);
        background: transparent;
        font-size: 13px;
        font-weight: 700;
      }
      .working-ring {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(217, 119, 87, 0.25);
        border-top-color: var(--coral);
        border-radius: 50%;
        animation: spin 800ms linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .sidebar-footer {
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-top: 1px solid var(--panel-border);
      }
      .sidebar-footer .nav-row {
        height: 42px;
      }

      /* ————— Main: flat canvas, no card ————— */
      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 52px 40px 40px minmax(0, 1fr);
        overflow: hidden;
      }
      .project-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 10px;
      }
      .project-identity {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .project-identity .folder {
        color: #a3a19d;
      }
      .project-title {
        font-size: 14.5px;
        font-weight: 590;
        letter-spacing: -0.005em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .project-detail {
        margin-top: 1px;
        color: #6b6965;
        font-size: 12px;
      }
      .project-health {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 22px;
        padding: 0 9px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.06);
        color: #a8a6a2;
        font-size: 12px;
        font-weight: 450;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        flex: none;
      }
      .dot.green {
        color: var(--green);
      }
      .dot.amber {
        color: var(--gold);
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .top-action {
        height: 32px;
        border: 0;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 11px;
        color: #a8a6a2;
        background: transparent;
        font-size: 13px;
        transition:
          transform var(--dur-press) var(--ease-out),
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease;
      }
      .top-action.primary {
        color: #f0eeec;
        background: rgba(255, 255, 255, 0.08);
        font-weight: 500;
      }

      /* ————— Capability row: quiet text, Claude style ————— */
      .cap-tabs {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 0 8px;
        overflow-x: auto;
      }
      .cap-tab {
        position: relative;
        height: 32px;
        flex: 0 0 auto;
        border: 0;
        border-radius: 9px;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 0 11px;
        color: #7a7874;
        background: transparent;
        font-size: 13px;
        transition:
          color var(--dur-hover) ease,
          background-color var(--dur-hover) ease;
      }
      .cap-tab.active {
        color: #ece9e6;
        background: rgba(255, 255, 255, 0.07);
      }
      .count {
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: #7a7874;
        background: rgba(255, 255, 255, 0.05);
        font-size: 10.5px;
        font-variant-numeric: tabular-nums;
      }
      .cap-tab.active .count {
        color: #b5b3af;
      }

      /* ————— Object tabs: session pills ————— */
      .object-tabs {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        padding: 0 8px;
        overflow-x: auto;
      }
      .object-tab {
        position: relative;
        height: 32px;
        min-width: 150px;
        max-width: 225px;
        flex: 0 0 auto;
        border: 1px solid transparent;
        border-radius: 10px;
        display: grid;
        grid-template-columns: 17px minmax(0, 1fr) 20px;
        align-items: center;
        gap: 7px;
        padding: 0 6px 0 10px;
        text-align: left;
        color: #7a7874;
        background: transparent;
        font-size: 12.5px;
        transition:
          color var(--dur-hover) ease,
          background-color var(--dur-hover) ease,
          border-color var(--dur-hover) ease;
      }
      .object-tab.active {
        color: #ece9e6;
        background: var(--panel);
        border-color: var(--panel-border);
      }
      .object-type {
        color: #7a7874;
        transition: color var(--dur-hover) ease;
      }
      .object-tab.active .object-type {
        color: var(--coral);
      }
      .tab-close {
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: #5d5b58;
        background: transparent;
        opacity: 0;
        transition:
          opacity var(--dur-hover) ease,
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease;
      }
      .object-tab.active .tab-close {
        opacity: 1;
      }
      .object-add {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        border: 0;
        border-radius: 9px;
        display: grid;
        place-items: center;
        color: #6b6965;
        background: transparent;
        transition:
          transform var(--dur-press) var(--ease-out),
          color var(--dur-hover) ease,
          background-color var(--dur-hover) ease;
      }

      /* ————— Thread ————— */
      .object-thread {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(520px, 1fr) 336px;
        gap: 12px;
        padding-top: 8px;
      }
      .conversation {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 44px minmax(0, 1fr) auto;
      }
      .conversation-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 10px;
      }
      .conversation-title {
        min-width: 0;
      }
      .conversation-title h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 590;
        letter-spacing: -0.005em;
      }
      .conversation-title p {
        margin: 2px 0 0;
        color: #6b6965;
        font-size: 12px;
      }
      .conversation-status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #8a8884;
        font-size: 12px;
      }
      .messages {
        min-height: 0;
        overflow: auto;
        padding: 28px max(24px, calc((100% - 680px) / 2)) 20px;
      }
      .message {
        width: min(680px, 100%);
        margin: 0 auto 28px;
      }
      .message.user {
        display: flex;
        justify-content: flex-end;
      }
      .messages .message {
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity var(--dur-enter) var(--ease-out),
          transform var(--dur-enter) var(--ease-out);
        @starting-style {
          opacity: 0;
          transform: translateY(6px);
        }
      }
      .bubble {
        max-width: 78%;
        padding: 11px 16px;
        border-radius: 18px;
        color: #e6e4e1;
        background: #1f1f1f;
        font-size: 14px;
        line-height: 1.55;
      }
      .assistant-head {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 10px;
        color: #8a8884;
        font-size: 12px;
      }
      .assistant-avatar {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--coral);
        background: transparent;
        font-size: 16px;
        font-weight: 700;
      }
      .assistant-copy {
        color: #e3e1de;
        font-size: 14.5px;
        line-height: 1.65;
      }
      .assistant-copy p {
        margin: 0 0 12px;
      }
      .tools {
        margin-top: 14px;
        padding-left: 14px;
        border-left: 1px solid rgba(255, 255, 255, 0.09);
      }
      .tool {
        min-height: 28px;
        display: flex;
        align-items: center;
        gap: 9px;
        color: #8a8884;
        font-size: 12.5px;
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity var(--dur-enter) var(--ease-out),
          transform var(--dur-enter) var(--ease-out);
        transition-delay: calc(var(--i, 0) * 40ms);
        @starting-style {
          opacity: 0;
          transform: translateY(4px);
        }
      }
      .tool .icon {
        color: #6b6965;
      }

      /* ————— Composer: Claude desktop style ————— */
      .composer-wrap {
        padding: 10px 10px 6px;
      }
      .composer {
        width: min(720px, 100%);
        min-height: 96px;
        margin: 0 auto;
        padding: 14px 14px 10px;
        border-radius: 18px;
        background: #141414;
        border: 1px solid rgba(255, 255, 255, 0.09);
        transition: border-color var(--dur-hover) ease;
      }
      .composer:focus-within {
        border-color: rgba(255, 255, 255, 0.18);
      }
      .composer textarea {
        width: 100%;
        height: 42px;
        resize: none;
        border: 0;
        outline: 0;
        padding: 0 2px;
        color: #e6e4e1;
        background: transparent;
        font-size: 14px;
        caret-color: var(--coral);
      }
      .composer textarea::placeholder {
        color: #5d5b58;
      }
      .composer-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .composer-left,
      .composer-right {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .composer-chip {
        height: 28px;
        border: 0;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        color: #8a8884;
        background: transparent;
        font-size: 12.5px;
        transition:
          background-color var(--dur-hover) ease,
          color var(--dur-hover) ease,
          transform var(--dur-press) var(--ease-out);
      }
      .composer-chip.access {
        color: var(--gold);
      }
      .composer-model {
        color: #6b6965;
        font-size: 12.5px;
        margin-right: 6px;
      }
      .send {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #141414;
        background: #e9e7e4;
        transition:
          transform var(--dur-press) var(--ease-out),
          background-color var(--dur-hover) ease;
      }

      /* ————— Object pane: floating bordered card, like the Environment panel ————— */
      .object-pane {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        align-self: start;
        max-height: 100%;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
      }
      .pane-inner {
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity var(--dur-enter) var(--ease-out),
          transform var(--dur-enter) var(--ease-out);
        transition-delay: 30ms;
        @starting-style {
          opacity: 0;
          transform: translateY(8px);
        }
      }
      .object-head {
        padding: 16px;
        border-bottom: 1px solid var(--panel-border);
      }
      .object-kind {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: #7a7874;
        font-size: 11px;
        font-weight: 550;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .object-head h2 {
        margin: 10px 0 0;
        font-size: 15px;
        font-weight: 590;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .object-head p {
        margin: 6px 0 0;
        color: #8a8884;
        font-size: 12px;
        line-height: 1.55;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 24px;
        padding: 0 9px;
        border-radius: 8px;
        color: #a8a6a2;
        background: rgba(255, 255, 255, 0.05);
        font-size: 11px;
        text-transform: none;
        letter-spacing: normal;
        font-weight: 480;
        white-space: nowrap;
      }
      .object-section {
        padding: 15px 16px;
        border-bottom: 1px solid var(--panel-border);
      }
      .object-section:last-child {
        border-bottom: 0;
      }
      .object-section h3 {
        margin: 0 0 10px;
        color: #7a7874;
        font-size: 11px;
        font-weight: 550;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .object-card {
        padding: 11px 12px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.04);
        margin-top: 7px;
      }
      .object-card b {
        display: block;
        font-size: 12.5px;
        font-weight: 560;
      }
      .object-card p {
        margin: 5px 0 0;
        color: #8a8884;
        font-size: 12px;
        line-height: 1.55;
      }
      .diff {
        border-radius: 11px;
        overflow: hidden;
        background: #101010;
        border: 1px solid var(--panel-border);
      }
      .diff-file {
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        color: #8a8884;
        background: rgba(255, 255, 255, 0.03);
        font-size: 11px;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      }
      .code-line {
        min-height: 22px;
        display: grid;
        grid-template-columns: 32px 1fr;
        align-items: center;
        padding-right: 6px;
        color: #999;
        font:
          11px/1.4 ui-monospace,
          "SFMono-Regular",
          Consolas,
          monospace;
      }
      .code-line .ln {
        color: #504e4b;
        text-align: right;
        padding-right: 8px;
        user-select: none;
        font-variant-numeric: tabular-nums;
      }
      .code-line.add {

          tools: ["Watched GitHub Actions", "Collected job timings", "Confirmed deployable state"],
          pane: `<div class="object-head"><div class="object-kind"><span>CI run #883</span><span class="status-pill"><span class="dot green"></span>Passed</span></div><h2>Main is deployable</h2><p>18 checks passed · 2m 41s total · commit 92de34a</p></div><section class="object-section"><h3>Jobs</h3><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Focused web tests</span><time>41s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Server contracts</span><time>36s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Desktop bundle</span><time>1m 54s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Secret scan</span><time>18s</time></div></section><section class="object-section"><h3>Next action</h3><button class="decision-choice"><span>Open deployment thread</span><svg class="icon small"><use href="#i-compose"/></svg></button></section>`,
        },
        infra: {
          title: "Production infrastructure",
          meta: "Infrastructure thread · 6 services · Live project context",
          status: "Healthy",
          branch: "main",
          prompt:
            "Map the infrastructure for Chitauri and keep the thread attached to the live service inventory.",
          answer:
            "The initial map covers the web server, desktop runtime, WebSocket broker, provider sessions, state database, and CI delivery path. All six services are healthy.",
          tools: [
            "Discovered service boundaries",
            "Mapped owners and environments",
            "Checked current service health",
          ],
          pane: `<div class="object-head"><div class="object-kind"><span>Infrastructure map</span><span class="status-pill"><span class="dot green"></span>Healthy</span></div><h2>Production infrastructure</h2><p>6 services · 2 environments · no active incidents</p></div><section class="object-section"><h3>Services</h3><div class="object-card"><b>Web + WebSocket server</b><p>Production · healthy · owner: Chitauri</p></div><div class="object-card"><b>Desktop runtime</b><p>macOS · healthy · local provider sessions</p></div><div class="object-card"><b>State database</b><p>SQLite projections · healthy · local-first</p></div></section>`,
        },
      };

      const messages = document.querySelector("#messages");
      const pane = document.querySelector("#object-pane");
      const title = document.querySelector("#thread-title");
      const meta = document.querySelector("#thread-meta");
      const status = document.querySelector("#thread-status");
      const branch = document.querySelector("#branch-chip");
      let activeObject = "direction";

      function renderObject(id) {
        const data = objectData[id];
        if (!data) return;
        activeObject = id;
        title.textContent = data.title;
        meta.textContent = data.meta;
        status.textContent = data.status;
        branch.textContent = data.branch;
        messages.innerHTML = `<div class="message user"><div class="bubble"></div></div><div class="message assistant"><div class="assistant-head"><span class="assistant-avatar">✳</span><span>Codex · working in Chitauri</span></div><div class="assistant-copy"><p></p><div class="tools"></div></div></div>`;
        messages.querySelector(".bubble").textContent = data.prompt;
        messages.querySelector(".assistant-copy p").textContent = data.answer;
        const tools = messages.querySelector(".tools");
        data.tools.forEach((tool, i) => {
          const row = document.createElement("div");
          row.className = "tool";
          row.style.setProperty("--i", i);
          row.innerHTML = `<svg class="icon small"><use href="#i-check"/></svg><span></span>`;
          row.querySelector("span").textContent = tool;
          tools.append(row);
        });
        pane.innerHTML = `<div class="pane-inner">${data.pane}</div>`;
        document
          .querySelectorAll(".object-tab")
          .forEach((tab) => tab.classList.toggle("active", tab.dataset.object === id));
        document
          .querySelectorAll(".object-link")
          .forEach((link) => link.classList.toggle("active", link.dataset.object === id));
      }

      document.querySelectorAll(".object-tab").forEach((tab) =>
        tab.addEventListener("click", (event) => {
          if (event.target.closest(".tab-close")) return;
          renderObject(tab.dataset.object);
        }),
      );
      document
        .querySelectorAll(".object-link")
        .forEach((link) => link.addEventListener("click", () => renderObject(link.dataset.object)));
      document.querySelectorAll(".tab-close").forEach((close) =>
        close.addEventListener("click", (event) => {
          event.stopPropagation();
          const tab = close.closest(".object-tab");
          const wasActive = tab.classList.contains("active");
          tab.remove();
          if (wasActive)
            renderObject(document.querySelector(".object-tab")?.dataset.object || "direction");
        }),
      );

      const capabilityMap = {
        threads: "direction",
        research: "research",
        github: "pr",
        review: "pr",
        ci: "ci",
        infra: "infra",
      };
      document.querySelectorAll(".cap-tab").forEach((tab) =>
        tab.addEventListener("click", () => {
          document.querySelectorAll(".cap-tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          renderObject(capabilityMap[tab.dataset.capability]);
        }),
      );
      document
        .querySelectorAll(".capability-link")
        .forEach((link) =>
          link.addEventListener("click", () =>
            renderObject(capabilityMap[link.dataset.capability]),
          ),
        );

      const input = document.querySelector("#composer-input");
      function sendMessage() {
        const value = input.value.trim();
        if (!value) {
          input.focus();
          return;
        }
        const message = document.createElement("div");
        message.className = "message user";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = value;
        message.append(bubble);
        messages.append(message);
        messages.scrollTop = messages.scrollHeight;
        input.value = "";
        showToast(`Message sent in ${objectData[activeObject].title}`);
      }
      document.querySelector("#send").addEventListener("click", sendMessage);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          sendMessage();
        }
      });
      document
        .querySelector(".object-add")
        .addEventListener("click", () => showToast("Choose a Chitauri object to open as a thread"));

      let toastTimer;
      function showToast(text) {
        const toast = document.querySelector("#toast");
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
      }
      renderObject("direction");
    </script>
  </body>
</html>
