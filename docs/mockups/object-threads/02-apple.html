<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chitauri — Object Threads</title>
  <style>
    :root {
      color-scheme: light;
      --background: #eef0f3;
      --sidebar: rgba(243,243,243,.78);
      --surface: #ffffff;
      --surface-canvas: #fafafa;
      --secondary: rgba(0,0,0,.045);
      --secondary-hover: rgba(0,0,0,.075);
      --foreground: #1d1d1f;
      --muted: #86868b;
      --faint: #a1a1a6;
      --border: rgba(0,0,0,.08);
      --border-strong: rgba(0,0,0,.12);
      --accent: #007aff;
      --accent-hover: #0071e3;
      --accent-tint: rgba(0,122,255,.12);
      --green: #34c759;
      --amber: #ff9500;
      --ease-out: cubic-bezier(.23,1,.32,1);
      --ease-in-out: cubic-bezier(.77,0,.175,1);
      --dur-press: 120ms;
      --dur-hover: 140ms;
      --dur-enter: 220ms;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(1100px 760px at 12% -12%, #eef2f7, transparent 62%),
        linear-gradient(160deg, #e7ebf0 0%, #dde1e8 46%, #eef1f5 100%);
      background-attachment: fixed;
      color: var(--foreground);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }
    svg { display: block; }
    :focus-visible { outline: 2px solid rgba(0,122,255,.55); outline-offset: 2px; border-radius: 8px; }
    ::selection { background: rgba(0,122,255,.22); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.16); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-track { background: transparent; }
    .icon { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .icon.small { width: 14px; height: 14px; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; }
    .nowrap { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .app { width: 100%; height: 100%; display: grid; grid-template-columns: 272px minmax(0,1fr); }

    /* ————— Sidebar ————— */
    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: 52px auto minmax(0,1fr) 48px;
      background: var(--sidebar);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      color: #3c3c43;
      box-shadow: inset -1px 0 var(--border);
    }
    .window-bar { display: flex; align-items: center; gap: 16px; padding: 0 14px; }
    .traffic { display: flex; gap: 7px; }
    .traffic span:nth-child(1) { background: #ff5f57; }
    .traffic span:nth-child(2) { background: #febc2e; }
    .traffic span:nth-child(3) { background: #28c840; }
    .traffic span { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); }
    .history { display: flex; align-items: center; gap: 6px; margin-left: 7px; }
    .icon-button {
      width: 34px; height: 34px; border: 0; border-radius: 8px;
      display: grid; place-items: center; color: #6e6e73; background: transparent;
      transition: background-color var(--dur-hover) ease, color var(--dur-hover) ease, transform var(--dur-press) var(--ease-out);
    }
    .icon-button:active, .top-action:active, .send:active, .object-add:active,
    .nav-row:active, .side-row:active, .composer-chip:active, .decision-choice:active { transform: scale(.97); }
    .sidebar-primary { padding: 8px 8px 10px; display: grid; gap: 2px; }
    .nav-row {
      width: 100%; height: 39px; border: 0; border-radius: 6px;
      display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 8px;
      padding: 0 8px; text-align: left; color: #1d1d1f; background: transparent; font-size: 13px;
      transition: background-color var(--dur-hover) ease, transform var(--dur-press) var(--ease-out);
    }
    .nav-row .icon { color: #6e6e73; }
    .shortcut { color: #a1a1a6; font-size: 11px; font-variant-numeric: tabular-nums; }
    .sidebar-scroll { min-height: 0; overflow: auto; padding: 2px 8px 20px; }
    .section-head { height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; color: #86868b; font-size: 11px; font-weight: 590; letter-spacing: .02em; }
    .section-head button { width: 28px; height: 28px; border: 0; border-radius: 6px; display: grid; place-items: center; color: #86868b; background: transparent; transition: background-color var(--dur-hover) ease, color var(--dur-hover) ease; }
    .side-row {
      width: 100%; min-height: 38px; border: 0; border-radius: 6px;
      display: grid; grid-template-columns: 25px minmax(0,1fr) auto; align-items: center; gap: 6px;
      padding: 5px 8px; text-align: left; color: #3c3c43; background: transparent;
      transition: background-color var(--dur-hover) ease, color var(--dur-hover) ease, transform var(--dur-press) var(--ease-out);
    }
    .side-row.active { background: var(--accent-tint); color: var(--accent); }
    .side-row.project-active { background: rgba(0,0,0,.04); }
    .side-row .leading { display: grid; place-items: center; color: #6e6e73; }
    .side-row.active .leading { color: var(--accent); }
    .side-row .label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-row .meta { color: #a1a1a6; font-size: 11px; }
    .nested { position: relative; margin-left: 15px; padding-left: 9px; }
    .nested::before { content: ""; position: absolute; left: 0; top: 1px; bottom: 4px; width: 1px; background: rgba(0,0,0,.08); }
    .nested .side-row { min-height: 36px; grid-template-columns: 23px minmax(0,1fr) auto; padding-left: 6px; font-size: 12px; }
    .provider-mark { width: 17px; height: 17px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: #3a3a3c; font-size: 8px; font-weight: 700; }
    .working-ring { width: 14px; height: 14px; border: 2px solid #d2d2d7; border-top-color: #86868b; border-radius: 50%; animation: spin 800ms linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sidebar-footer { display: flex; align-items: center; padding: 0 9px; }

    /* ————— Main shell ————— */
    .main {
      min-width: 0; min-height: 0;
      display: grid; grid-template-rows: 54px 43px 38px minmax(0,1fr);
      overflow: hidden; background: var(--surface);
      border-radius: 16px 0 0 0;
      box-shadow: inset 1px 0 var(--border), inset 0 1px var(--border);
    }
    .project-header { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 0 17px; }
    .project-identity { min-width: 0; display: flex; align-items: center; gap: 9px; }
    .project-identity .folder { color: #6e6e73; }
    .project-title { font-size: 13px; font-weight: 620; letter-spacing: -.01em; }
    .project-detail { margin-top: 2px; color: #86868b; font-size: 11px; }
    .project-health { display: inline-flex; align-items: center; gap: 6px; margin-left: 6px; color: #6e6e73; font-size: 11px; font-weight: 450; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: none; }
    .dot.green { color: var(--green); }
    .dot.amber { color: var(--amber); }
    .header-actions { display: flex; align-items: center; gap: 7px; }
    .top-action {
      height: 34px; border: 0; border-radius: 9px; display: inline-flex; align-items: center; gap: 7px;
      padding: 0 12px; color: #3c3c43; background: transparent; box-shadow: inset 0 0 0 1px var(--border);
      font-size: 12px;
      transition: transform var(--dur-press) var(--ease-out), background-color var(--dur-hover) ease, box-shadow var(--dur-hover) ease;
    }
    .top-action.primary { color: #fff; background: var(--accent); box-shadow: none; font-weight: 600; }

    /* ————— Capability tabs ————— */
    .cap-tabs { display: flex; align-items: center; gap: 3px; padding: 0 14px; overflow-x: auto; box-shadow: inset 0 -1px var(--border); }
    .cap-tab {
      position: relative; height: 30px; flex: 0 0 auto; border: 0; border-radius: 7px;
      display: flex; align-items: center; gap: 7px; padding: 0 11px;
      color: #6e6e73; background: transparent; font-size: 12px;
      transition: color var(--dur-hover) ease, background-color var(--dur-hover) ease;
    }
    .cap-tab.active { color: #1d1d1f; background: rgba(0,0,0,.06); }
    .count { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 5px; display: grid; place-items: center; color: #86868b; background: rgba(0,0,0,.045); font-size: 10px; font-variant-numeric: tabular-nums; }
    .cap-tab.active .count { color: #1d1d1f; background: rgba(0,0,0,.08); }

    /* ————— Object tabs ————— */
    .object-tabs { display: flex; align-items: center; gap: 4px; min-width: 0; padding: 5px 8px; overflow-x: auto; background: #fbfbfc; box-shadow: inset 0 -1px var(--border); }
    .object-tab {
      position: relative; height: 30px; min-width: 150px; max-width: 225px; border: 0; border-radius: 8px;
      display: grid; grid-template-columns: 17px minmax(0,1fr) 20px; align-items: center; gap: 7px;
      padding: 0 6px 0 10px; text-align: left; color: #6e6e73; background: transparent; font-size: 11.5px;
      transition: color var(--dur-hover) ease, background-color var(--dur-hover) ease, box-shadow var(--dur-hover) ease;
    }
    .object-tab.active { color: #1d1d1f; background: #ffffff; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .object-type { color: #86868b; transition: color var(--dur-hover) ease; }
    .object-tab.active .object-type { color: #3c3c43; }
    .tab-close {
      width: 20px; height: 20px; border: 0; border-radius: 5px; display: grid; place-items: center;
      color: #a1a1a6; background: transparent; opacity: 0;
      transition: opacity var(--dur-hover) ease, background-color var(--dur-hover) ease, color var(--dur-hover) ease;
    }
    .object-tab.active .tab-close { opacity: 1; }
    .object-add {
      width: 30px; height: 30px; flex: 0 0 auto; border: 0; border-radius: 7px; display: grid; place-items: center;
      color: #86868b; background: transparent;
      transition: transform var(--dur-press) var(--ease-out), color var(--dur-hover) ease, background-color var(--dur-hover) ease;
    }

    /* ————— Thread ————— */
    .object-thread { min-width: 0; min-height: 0; display: grid; grid-template-columns: minmax(520px,1fr) 340px; }
    .conversation { min-width: 0; min-height: 0; display: grid; grid-template-rows: 48px minmax(0,1fr) auto; }
    .conversation-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 15px; box-shadow: inset 0 -1px var(--border); }
    .conversation-title { min-width: 0; }
    .conversation-title h1 { margin: 0; font-size: 13px; font-weight: 610; letter-spacing: -.01em; }
    .conversation-title p { margin: 2px 0 0; color: #86868b; font-size: 11px; }
    .conversation-status { display: flex; align-items: center; gap: 7px; color: #6e6e73; font-size: 11px; }
    .messages { min-height: 0; overflow: auto; padding: 24px max(34px,calc((100% - 720px)/2)) 20px; }
    .message { width: min(720px,100%); margin: 0 auto 23px; }
    .message.user { display: flex; justify-content: flex-end; }
    .messages .message {
      opacity: 1; transform: translateY(0);
      transition: opacity var(--dur-enter) var(--ease-out), transform var(--dur-enter) var(--ease-out);
      @starting-style { opacity: 0; transform: translateY(6px); }
    }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 14px; color: #1d1d1f; background: var(--accent-tint); box-shadow: inset 0 0 0 1px rgba(0,122,255,.16); font-size: 12.5px; line-height: 1.55; }
    .assistant-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; color: #6e6e73; font-size: 11px; }
    .assistant-avatar { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: #3a3a3c; font-size: 8px; font-weight: 700; }
    .assistant-copy { color: #1d1d1f; font-size: 12.5px; line-height: 1.6; }
    .assistant-copy p { margin: 0 0 10px; }
    .tools { margin-top: 12px; padding-left: 12px; box-shadow: inset 1px 0 rgba(0,0,0,.08); }
    .tool {
      min-height: 27px; display: flex; align-items: center; gap: 8px; color: #6e6e73; font-size: 11px;
      opacity: 1; transform: translateY(0);
      transition: opacity var(--dur-enter) var(--ease-out), transform var(--dur-enter) var(--ease-out);
      transition-delay: calc(var(--i, 0) * 40ms);
      @starting-style { opacity: 0; transform: translateY(4px); }
    }
    .tool .icon { color: #a1a1a6; }

    /* ————— Composer ————— */
    .composer-wrap { padding: 9px 15px 15px; background: linear-gradient(transparent,rgba(255,255,255,.97) 28%); }
    .composer {
      width: min(760px,100%); min-height: 94px; margin: 0 auto; padding: 12px; border-radius: 12px;
      background: #ffffff; box-shadow: inset 0 0 0 1px var(--border), 0 10px 30px rgba(0,0,0,.08);
      transition: box-shadow var(--dur-hover) ease;
    }
    .composer:focus-within { box-shadow: inset 0 0 0 1px rgba(0,122,255,.4), 0 0 0 3.5px rgba(0,122,255,.25), 0 10px 30px rgba(0,0,0,.08); }
    .composer textarea { width: 100%; height: 43px; resize: none; border: 0; outline: 0; padding: 1px 2px; color: #1d1d1f; background: transparent; font-size: 12.5px; caret-color: var(--accent); }
    .composer textarea::placeholder { color: #a1a1a6; }
    .composer-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .composer-left, .composer-right { display: flex; align-items: center; gap: 6px; }
    .composer-chip {
      height: 27px; border: 0; border-radius: 7px; display: inline-flex; align-items: center; gap: 5px;
      padding: 0 8px; color: #6e6e73; background: transparent; font-size: 11px;
      transition: background-color var(--dur-hover) ease, color var(--dur-hover) ease, transform var(--dur-press) var(--ease-out);
    }
    .composer-model { color: #a1a1a6; font-size: 11px; }
    .send {
      width: 31px; height: 31px; border: 0; border-radius: 50%; display: grid; place-items: center;
      color: #fff; background: var(--accent);
      transition: transform var(--dur-press) var(--ease-out), opacity var(--dur-hover) ease, background-color var(--dur-hover) ease;
    }

    /* ————— Object pane ————— */
    .object-pane { min-width: 0; min-height: 0; overflow: auto; background: var(--surface-canvas); box-shadow: inset 1px 0 var(--border); }
    .pane-inner {
      opacity: 1; transform: translateY(0);
      transition: opacity var(--dur-enter) var(--ease-out), transform var(--dur-enter) var(--ease-out);
      transition-delay: 30ms;
      @starting-style { opacity: 0; transform: translateY(8px); }
    }
    .object-head { padding: 16px; box-shadow: inset 0 -1px var(--border); }
    .object-kind { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: #86868b; font-size: 10px; font-weight: 650; text-transform: uppercase; letter-spacing: .09em; }
    .object-head h2 { margin: 10px 0 0; font-size: 15px; font-weight: 620; line-height: 1.3; letter-spacing: -.015em; }
    .object-head p { margin: 6px 0 0; color: #6e6e73; font-size: 11px; line-height: 1.5; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 8px; border-radius: 7px; color: #48484a; background: #ffffff; box-shadow: inset 0 0 0 1px var(--border); font-size: 10px; text-transform: none; letter-spacing: normal; font-weight: 500; white-space: nowrap; }
    .object-section { padding: 15px 16px; box-shadow: inset 0 -1px var(--border); }
    .object-section h3 { margin: 0 0 10px; color: #86868b; font-size: 10px; font-weight: 650; text-transform: uppercase; letter-spacing: .09em; }
    .object-card { padding: 11px 12px; border-radius: 10px; background: #ffffff; box-shadow: 0 1px 2px rgba(0,0,0,.05), inset 0 0 0 1px var(--border); margin-top: 7px; }
    .object-card b { display: block; font-size: 11.5px; font-weight: 600; color: #1d1d1f; }
    .object-card p { margin: 5px 0 0; color: #6e6e73; font-size: 11px; line-height: 1.5; }
    .diff { border-radius: 10px; overflow: hidden; background: #ffffff; box-shadow: 0 1px 2px rgba(0,0,0,.05), inset 0 0 0 1px var(--border); }
    .diff-file { height: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; color: #6e6e73; background: rgba(0,0,0,.03); font-size: 10.5px; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; }
    .code-line { min-height: 22px; display: grid; grid-template-columns: 32px 1fr; align-items: center; padding-right: 6px; color: #48484a; font: 10.5px/1.4 ui-monospace, "SFMono-Regular", Consolas, monospace; }
    .code-line .ln { color: #c7c7cc; text-align: right; padding-right: 8px; user-select: none; font-variant-numeric: tabular-nums; }
    .code-line.add { color: #1c7a34; background: rgba(52,199,89,.09); }
    .decision-choice {
      width: 100%; min-height: 39px; border: 0; border-radius: 9px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 0 11px; text-align: left; color: #3c3c43; background: #ffffff; box-shadow: inset 0 0 0 1px var(--border); margin-top: 6px; font-size: 11.5px;
      transition: background-color var(--dur-hover) ease, color var(--dur-hover) ease, box-shadow var(--dur-hover) ease, transform var(--dur-press) var(--ease-out);
    }
    .decision-choice.selected { color: #1d1d1f; box-shadow: inset 0 0 0 1px rgba(0,122,255,.4); background: rgba(0,122,255,.08); }
    .decision-choice.selected .icon { color: var(--accent); }
    .ci-row { height: 38px; display: grid; grid-template-columns: 18px 1fr auto; align-items: center; gap: 8px; color: #3c3c43; font-size: 11.5px; }
    .ci-row + .ci-row { box-shadow: inset 0 1px var(--border); }
    .ci-row time { color: #a1a1a6; font-size: 11px; font-variant-numeric: tabular-nums; }

    /* ————— Toast ————— */
    .toast {
      position: fixed; z-index: 40; top: 14px; left: 50%;
      transform: translate(-50%,-130%); opacity: 0;
      padding: 9px 13px; border-radius: 10px; color: #1d1d1f;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 8px 30px rgba(0,0,0,.14), inset 0 0 0 1px rgba(0,0,0,.06);
      font-size: 11.5px; font-weight: 600;
      transition: opacity 150ms var(--ease-out), transform 220ms var(--ease-out);
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translate(-50%,0); }

    /* ————— Hover states (pointer devices only) ————— */
    @media (hover: hover) and (pointer: fine) {
      .icon-button:hover { color: #1d1d1f; background: var(--secondary); }
      .nav-row:hover { background: var(--secondary); }
      .section-head button:hover { color: #1d1d1f; background: var(--secondary); }
      .side-row:hover { background: var(--secondary); }
      .side-row.active:hover { background: rgba(0,122,255,.16); }
      .top-action:hover { background: var(--secondary); }
      .top-action.primary:hover { background: var(--accent-hover); }
      .cap-tab:hover { color: #1d1d1f; }
      .cap-tab.active:hover { background: rgba(0,0,0,.07); }
      .object-tab:hover { color: #3c3c43; background: rgba(0,0,0,.03); }
      .object-tab:hover .tab-close { opacity: 1; }
      .object-tab.active:hover { color: #1d1d1f; background: #ffffff; }
      .tab-close:hover { color: #1d1d1f; background: rgba(0,0,0,.07); }
      .object-add:hover { color: #1d1d1f; background: var(--secondary); }
      .composer-chip:hover { background: var(--secondary); color: #1d1d1f; }
      .send:hover { background: var(--accent-hover); }
      .decision-choice:hover { background: rgba(0,0,0,.035); color: #1d1d1f; }
      .decision-choice.selected:hover { background: rgba(0,122,255,.12); }
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 238px minmax(0,1fr); }
      .object-thread { grid-template-columns: 1fr; }
      .object-pane { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0ms !important; animation: none !important; }
      .toast { transition: opacity 120ms ease; transform: translate(-50%,0); }
      .working-ring { border-top-color: #d2d2d7; opacity: .7; }
      .messages .message, .tool, .pane-inner { transform: none; }
    }
    @media (prefers-reduced-transparency: reduce) {
      .sidebar { background: #f3f3f3; backdrop-filter: none; -webkit-backdrop-filter: none; }
      .toast { background: #ffffff; backdrop-filter: none; -webkit-backdrop-filter: none; }
    }
  </style>
</head>

    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m16 16 5 5"/></symbol>

  <script>
    const objectData = {
      direction: {
        title: 'Project-first UI direction',
        meta: 'Project decision · Codex working in chitauri/project-home',
        status: 'Working',
        branch: 'chitauri/project-home',
        prompt: 'Keep threads as the primary way we collaborate with agents. Make the project the durable scope around them, using familiar horizontal tabs.',
        answer: 'This direction keeps Chitauri’s current shell and changes the working model, not the visual language. Each horizontal tab is an object thread: a normal agent conversation anchored to a project decision, PR, research artifact, CI run, or infrastructure service.',
        tools: ['Matched the current Chitauri sidebar hierarchy','Kept threads as the default project section','Attached this conversation to a project decision'],
        pane: `<div class="object-head"><div class="object-kind"><span>Project decision</span><span class="status-pill"><span class="dot amber"></span>Needs decision</span></div><h2>How should project work be organized?</h2><p>The thread remains the collaboration surface. The attached object carries durable state outside the transcript.</p></div><section class="object-section"><h3>Choose direction</h3><button class="decision-choice selected"><span>Object Threads</span><svg class="icon small"><use href="#i-check"/></svg></button><button class="decision-choice"><span>Traditional thread list</span></button><button class="decision-choice"><span>Project dashboard</span></button></section><section class="object-section"><h3>Design contract</h3><div class="object-card"><b>Project is the scope</b><p>Capabilities and object threads always belong to the selected project.</p></div><div class="object-card"><b>Thread is the collaboration</b><p>Every object opens with a full agent conversation, not a passive inspector.</p></div><div class="object-card"><b>Object is the memory</b><p>PR state, findings, decisions, and checks survive the transcript.</p></div></section>`
      },
      pr: {
        title: 'PR #16 · Diff audit',
        meta: 'Pull request thread · Review agent · 8 files changed',
        status: 'Review ready',
        branch: 'chitauri/audit-pierre-diffs',
        prompt: 'Review PR #16 and verify whether the Pierre diff integration introduces regressions.',
        answer: 'The review is complete. I verified two actionable issues and attached them directly to this pull request object. We can discuss or fix them here without losing the PR context.',
        tools: ['Read the pull request diff','Ran focused viewer tests','Verified two findings against source'],
        pane: `<div class="object-head"><div class="object-kind"><span>Pull request #16</span><span class="status-pill"><span class="dot green"></span>Ready for review</span></div><h2>Pierre diff integration audit</h2><p>8 files changed · +184 −61 · all focused checks passing</p></div><section class="object-section"><h3>Current diff</h3><div class="diff"><div class="diff-file"><span>DiffViewer.tsx</span><span>+12 −4</span></div><div class="code-line"><span class="ln">88</span><span>const viewer = createDiffViewer({</span></div><div class="code-line add"><span class="ln">89</span><span>+ renderGutter: true,</span></div><div class="code-line add"><span class="ln">90</span><span>+ collapseUnchanged: false,</span></div><div class="code-line"><span class="ln">91</span><span>  theme: resolvedTheme,</span></div><div class="code-line"><span class="ln">92</span><span>})</span></div></div></section><section class="object-section"><h3>Verified findings</h3><div class="object-card"><b>Viewer state resets on theme change</b><p>The adapter recreates the viewer and loses the current diff position.</p></div><div class="object-card"><b>Large diff threshold is not forwarded</b><p>The project virtualization guardrail is skipped by the new adapter.</p></div></section>`
      },
      research: {
        title: 'Settings simplification',
        meta: 'Research thread · Artifact ready · Updated 48m ago',
        status: 'Ready to implement',
        branch: 'main',
        prompt: 'Research how to simplify Chitauri settings without hiding important operational surfaces.',
        answer: 'The research is complete. The recommended structure reduces Settings to four categories and moves operational destinations into the project shell. The full plan stays attached here while we discuss implementation.',
        tools: ['Mapped current settings routes','Traced search and navigation coupling','Produced 12 source-backed findings'],
        pane: `<div class="object-head"><div class="object-kind"><span>Research artifact</span><span class="status-pill"><span class="dot green"></span>Complete</span></div><h2>Settings IA simplification</h2><p>12 findings · 7 decisions · implementation-ready</p></div><section class="object-section"><h3>Recommendation</h3><div class="object-card"><b>Four settings categories</b><p>General, Appearance, Agents, and Advanced.</p></div><div class="object-card"><b>Move operational surfaces out</b><p>Profile, Usage, Worktrees, Archived, and Shortcuts become first-class destinations.</p></div></section><section class="object-section"><h3>Next action</h3><button class="decision-choice selected"><span>Create implementation thread</span><svg class="icon small"><use href="#i-compose"/></svg></button></section>`
      },
      ci: {
        title: 'CI run #883',
        meta: 'Delivery thread · main · Triggered 6 minutes ago',
        status: '18/18 passing',
        branch: 'main',
        prompt: 'Watch CI run #883 and tell me immediately if anything needs intervention.',
        answer: 'All eighteen checks passed. The desktop bundle, focused transcript tests, and server contract suite are green. This thread can stay attached to the run for deployment follow-up.',
        tools: ['Watched GitHub Actions','Collected job timings','Confirmed deployable state'],
        pane: `<div class="object-head"><div class="object-kind"><span>CI run #883</span><span class="status-pill"><span class="dot green"></span>Passed</span></div><h2>Main is deployable</h2><p>18 checks passed · 2m 41s total · commit 92de34a</p></div><section class="object-section"><h3>Jobs</h3><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Focused web tests</span><time>41s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Server contracts</span><time>36s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Desktop bundle</span><time>1m 54s</time></div><div class="ci-row"><svg class="icon small" style="color:var(--green)"><use href="#i-check"/></svg><span>Secret scan</span><time>18s</time></div></section><section class="object-section"><h3>Next action</h3><button class="decision-choice"><span>Open deployment thread</span><svg class="icon small"><use href="#i-compose"/></svg></button></section>`
      },
      infra: {
        title: 'Production infrastructure',
        meta: 'Infrastructure thread · 6 services · Live project context',
        status: 'Healthy',
        branch: 'main',
        prompt: 'Map the infrastructure for Chitauri and keep the thread attached to the live service inventory.',
        answer: 'The initial map covers the web server, desktop runtime, WebSocket broker, provider sessions, state database, and CI delivery path. All six services are healthy.',
        tools: ['Discovered service boundaries','Mapped owners and environments','Checked current service health'],
        pane: `<div class="object-head"><div class="object-kind"><span>Infrastructure map</span><span class="status-pill"><span class="dot green"></span>Healthy</span></div><h2>Production infrastructure</h2><p>6 services · 2 environments · no active incidents</p></div><section class="object-section"><h3>Services</h3><div class="object-card"><b>Web + WebSocket server</b><p>Production · healthy · owner: Chitauri</p></div><div class="object-card"><b>Desktop runtime</b><p>macOS · healthy · local provider sessions</p></div><div class="object-card"><b>State database</b><p>SQLite projections · healthy · local-first</p></div></section>`
      }
    };

    const messages = document.querySelector('#messages');
    const pane = document.querySelector('#object-pane');
    const title = document.querySelector('#thread-title');
    const meta = document.querySelector('#thread-meta');
    const status = document.querySelector('#thread-status');
    const branch = document.querySelector('#branch-chip');
    let activeObject = 'direction';

    function renderObject(id) {
      const data = objectData[id];
      if (!data) return;
      activeObject = id;
      title.textContent = data.title;
      meta.textContent = data.meta;
      status.textContent = data.status;
      branch.textContent = data.branch;
      messages.innerHTML = `<div class="message user"><div class="bubble"></div></div><div class="message assistant"><div class="assistant-head"><span class="assistant-avatar">Cx</span><span>Codex · working in Chitauri</span></div><div class="assistant-copy"><p></p><div class="tools"></div></div></div>`;
      messages.querySelector('.bubble').textContent = data.prompt;
      messages.querySelector('.assistant-copy p').textContent = data.answer;
      const tools = messages.querySelector('.tools');
      data.tools.forEach((tool, i) => { const row = document.createElement('div'); row.className = 'tool'; row.style.setProperty('--i', i); row.innerHTML = `<svg class="icon small"><use href="#i-check"/></svg><span></span>`; row.querySelector('span').textContent = tool; tools.append(row); });
      pane.innerHTML = `<div class="pane-inner">${data.pane}</div>`;
      document.querySelectorAll('.object-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.object === id));
      document.querySelectorAll('.object-link').forEach(link => link.classList.toggle('active', link.dataset.object === id));
    }

    document.querySelectorAll('.object-tab').forEach(tab => tab.addEventListener('click', event => {
      if (event.target.closest('.tab-close')) return;
      renderObject(tab.dataset.object);
    }));
    document.querySelectorAll('.object-link').forEach(link => link.addEventListener('click', () => renderObject(link.dataset.object)));
    document.querySelectorAll('.tab-close').forEach(close => close.addEventListener('click', event => {
      event.stopPropagation();
      const tab = close.closest('.object-tab');
      const wasActive = tab.classList.contains('active');
      tab.remove();
      if (wasActive) renderObject(document.querySelector('.object-tab')?.dataset.object || 'direction');
    }));

    const capabilityMap = { threads:'direction', research:'research', github:'pr', review:'pr', ci:'ci', infra:'infra' };
    document.querySelectorAll('.cap-tab').forEach(tab => tab.addEventListener('click', () => {
      document.querySelectorAll('.cap-tab').forEach(item => item.classList.remove('active'));
      tab.classList.add('active');
      renderObject(capabilityMap[tab.dataset.capability]);
    }));
    document.querySelectorAll('.capability-link').forEach(link => link.addEventListener('click', () => renderObject(capabilityMap[link.dataset.capability])));

    const input = document.querySelector('#composer-input');
    function sendMessage() {
      const value = input.value.trim();
      if (!value) { input.focus(); return; }
      const message = document.createElement('div');
      message.className = 'message user';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = value;
      message.append(bubble);
      messages.append(message);
      messages.scrollTop = messages.scrollHeight;
      input.value = '';
      showToast(`Message sent in ${objectData[activeObject].title}`);
    }
    document.querySelector('#send').addEventListener('click', sendMessage);
    input.addEventListener('keydown', event => { if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) { event.preventDefault(); sendMessage(); } });
    document.querySelector('.object-add').addEventListener('click', () => showToast('Choose a Chitauri object to open as a thread'));

    let toastTimer;
    function showToast(text) { const toast = document.querySelector('#toast'); toast.textContent = text; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1700); }
    renderObject('direction');
  </script>
